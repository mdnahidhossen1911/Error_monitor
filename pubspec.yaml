name: error_monitor
description: >
  Production-ready crash tracking for Flutter. Zero Firebase dependency.
  Ships crash reports to any REST API with offline queue, breadcrumbs,
  session tracking, device context, and fingerprint-based issue grouping.
version: 1.1.0
homepage: https://github.com/mdnahidhossen1911/error_monitor
repository: https://github.com/mdnahidhossen1911/error_monitor
issue_tracker: https://github.com/mdnahidhossen1911/error_monitor/issues

topics:
  - crash-reporting
  - error-handling
  - monitoring
  - logging
  - debugging

environment:
  sdk: ^3.10.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

  device_info_plus: ^10.1.0
  connectivity_plus: ^6.0.3
  battery_plus: ^6.0.1
  shared_preferences: ^2.3.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:

  plugin:
    platforms:
      android:
        package: com.example.error_monitor
        pluginClass: ErrorMonitorPlugin
      ios:
        pluginClass: ErrorMonitorPlugin
      linux:
        pluginClass: ErrorMonitorPlugin
      macos:
        pluginClass: ErrorMonitorPlugin
      windows:
        pluginClass: ErrorMonitorPluginCApi


